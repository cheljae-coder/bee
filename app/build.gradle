plugins {
    id 'com.android.application'
}

android {
    namespace 'com.song.beewebview'
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId 'com.song.beewebview'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }
}
